name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    # 1. Setup Python (Matches your local version)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    # 2. Create and Activate Virtual Environment
    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate  # On Linux/Ubuntu runners
        pip install --upgrade pip
        pip install pytest-playwright playwright
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 3. Install Playwright Browsers (Required for the Healer)
    - name: Install Playwright Browsers
      run: |
        source venv/bin/activate
        playwright install --with-deps chromium

    # 4. Verify Environment for Copilot
    - name: Verify Setup
      run: |
        source venv/bin/activate
        pytest --version
        python -c "import playwright; print('Playwright Ready')"