[pytest]
pythonpath = .
log_cli = true
log_cli_level = INFO
log_file = logs/test.log
log_file_level = INFO
log_level = INFO
filterwarnings = ignore
timeout = 120
markers =
    smoke: Quick sanity checks
    regression: Full regression suite
    e2e: End-to-end business workflows
    api: API-only tests    leave_validation: Leave form validation tests
